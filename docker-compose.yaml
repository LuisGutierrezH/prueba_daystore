version: '3.7'
services:
  odoo_daystore:
    container_name: odoo_daystore
    image: odoo:17.0
    restart: always
    depends_on:
      - db_daystore
    ports:
      - 8069:8069
    volumes:
      - ./volumes/odoo-data:/var/lib/odoo
      - ./odoo/config/local.conf:/etc/odoo/odoo.conf
      - ./extra-addons:/mnt/extra-addons
  db_daystore:
    container_name: db_daystore
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      -  ${PWD}/volumes/postgres-data:/var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
